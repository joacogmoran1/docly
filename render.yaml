previews:
  generation: off

services:
  - type: web
    name: docly-web
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: ./client/dist
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - client/**
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: docly-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: api
    buildCommand: npm ci
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health/ready
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - api/**
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: TRUST_PROXY
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: docly-db
          property: connectionString
      - key: DB_SSL
        value: "false"
      - key: FRONTEND_URLS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAME_SITE
        value: lax
      - key: RATE_LIMIT_STORE
        value: sequelize
      - key: LOG_TO_FILES
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: docly-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    databaseName: docly
    user: docly
    diskSizeGB: 15
    storageAutoscalingEnabled: false
