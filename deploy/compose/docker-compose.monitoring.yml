services:
  loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ../monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    expose:
      - "3100"

  promtail:
    image: grafana/promtail:3.1.1
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ../monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${DOCLY_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/docly-secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${DOCLY_SECRETS_DIR}:/run/docly-secrets:ro
    ports:
      - "${DOCLY_MONITORING_BIND_ADDRESS:-127.0.0.1}:${DOCLY_GRAFANA_PORT:-3300}:3000"

  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "${DOCLY_MONITORING_BIND_ADDRESS:-127.0.0.1}:${DOCLY_UPTIME_KUMA_PORT:-3301}:3001"

volumes:
  grafana_data:
  loki_data:
  uptime_kuma_data:
